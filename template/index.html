<!DOCTYPE html>
<html lang="ps" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pashto Handwriting OCR</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #1e293b;
            --border: #e2e8f0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 2rem;
            display: flex;
            justify-content: center;
        }

        .container {
            background-color: var(--card-bg);
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            width: 100%;
            max-width: 800px;
        }

        h1 {
            text-align: center;
            color: var(--primary);
            margin-top: 0;
        }

        .upload-section {
            border: 2px dashed var(--primary);
            padding: 2rem;
            text-align: center;
            border-radius: 8px;
            margin-bottom: 2rem;
            background-color: #eff6ff;
        }

        input[type="file"] {
            display: none;
        }

        .custom-file-upload, .btn {
            background-color: var(--primary);
            color: white;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            border: none;
            font-size: 16px;
            font-weight: bold;
            transition: background-color 0.2s;
            display: inline-block;
            margin: 5px;
        }

        .custom-file-upload:hover, .btn:hover {
            background-color: var(--primary-hover);
        }

        #fileName {
            display: block;
            margin-top: 10px;
            color: #64748b;
        }

        /* The Editor specifically built for UC-2: Edit Text */
        .editor-section {
            display: none; /* Hidden until processing is done */
            margin-top: 2rem;
        }

        textarea {
            width: 100%;
            height: 200px;
            padding: 1rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 22px;
            line-height: 1.8;
            resize: vertical;
            box-sizing: border-box;
            /* Critical for Pashto */
            direction: rtl; 
            font-family: 'Times New Roman', Times, serif; 
        }

        .actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            justify-content: flex-start;
        }

        .loader {
            display: none;
            text-align: center;
            margin: 20px 0;
            font-weight: bold;
            color: var(--primary);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>د پښتو لاسي لیک پیژندنه</h1>
        <p style="text-align: center;">Offline Pashto Handwriting Recognition System</p>

        <div class="upload-section">
            <label for="imageUpload" class="custom-file-upload">
                انځور غوره کړئ (Select Image)
            </label>
            <input type="file" id="imageUpload" accept="image/png, image/jpeg">
            <span id="fileName">هیڅ انځور نه دی غوره شوی</span>
            <br><br>
            <button class="btn" id="processBtn" style="display: none;" onclick="processImage()">Recognize Text</button>
        </div>

        <div class="loader" id="loader">Processing your image using AI... Please wait.</div>

        <div class="editor-section" id="editorSection">
            <h3>Recognized Text (You can edit this below):</h3>
            <textarea id="resultText"></textarea>
            
            <div class="actions">
                <button class="btn" onclick="copyText()">Copy Text</button>
                <button class="btn" style="background-color: #059669;" onclick="exportToWord()">Export to Word</button>
            </div>
        </div>
    </div>

    <script>
        // File selection logic
        const imageUpload = document.getElementById('imageUpload');
        const fileName = document.getElementById('fileName');
        const processBtn = document.getElementById('processBtn');

        imageUpload.addEventListener('change', function() {
            if (this.files && this.files.length > 0) {
                fileName.textContent = this.files[0].name;
                processBtn.style.display = 'inline-block';
            }
        });

        // The core API call to your Flask App
        async function processImage() {
            const file = imageUpload.files[0];
            if (!file) return;

            const formData = new FormData();
            formData.append('image', file);

            document.getElementById('loader').style.display = 'block';
            document.getElementById('editorSection').style.display = 'none';
            processBtn.disabled = true;

            try {
                // Calls the /predict route you setup in app.py
                const response = await fetch('/predict', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (data.success) {
                    document.getElementById('resultText').value = data.text;
                    document.getElementById('editorSection').style.display = 'block';
                } else {
                    alert('Error: ' + data.error);
                }
            } catch (error) {
                alert('Connection failed. Make sure your Flask server is running.');
            } finally {
                document.getElementById('loader').style.display = 'none';
                processBtn.disabled = false;
            }
        }

        // UC-3: Copy to Clipboard Function
        function copyText() {
            const textArea = document.getElementById('resultText');
            textArea.select();
            document.execCommand('copy');
            alert('Text copied to clipboard!');
        }

        // UC-4: Export to Word Document
        function exportToWord() {
            const text = document.getElementById('resultText').value;
            if (!text) {
                alert('No text to export!');
                return;
            }

            // Wrapping the text in basic HTML to preserve the RTL format in MS Word
            const preHtml = "<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'><head><meta charset='utf-8'><title>Export HTML To Doc</title></head><body dir='rtl' style='font-family: Arial, sans-serif; font-size: 16pt;'>";
            const postHtml = "</body></html>";
            const html = preHtml + text.replace(/\n/g, '<br>') + postHtml;

            // Create a Blob with MS Word MIME type
            const blob = new Blob(['\ufeff', html], {
                type: 'application/msword'
            });
            
            // Create a temporary link to trigger the download
            const url = 'data:application/vnd.ms-word;charset=utf-8,' + encodeURIComponent(html);
            const filename = 'Pashto_Recognition.doc';
            
            const downloadLink = document.createElement("a");
            document.body.appendChild(downloadLink);
            
            if (navigator.msSaveOrOpenBlob) {
                navigator.msSaveOrOpenBlob(blob, filename);
            } else {
                downloadLink.href = url;
                downloadLink.download = filename;
                downloadLink.click();
            }
            document.body.removeChild(downloadLink);
        }
    </script>
</body>
</html>
