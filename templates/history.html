<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pashto OCR - History</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col">
    <nav class="bg-white shadow-sm border-b border-slate-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center space-x-8">
                    <a href="/" class="text-blue-600 font-extrabold text-2xl tracking-tight">Pashto OCR</a>
                    <div class="hidden md:flex space-x-4">
                        <a href="/" class="text-slate-500 hover:text-slate-900 px-3 py-2 rounded-md text-sm font-medium">Dashboard</a>
                        <a href="/new-scan" class="text-slate-500 hover:text-slate-900 px-3 py-2 rounded-md text-sm font-medium">New Scan</a>
                        <a href="/history" class="text-slate-900 px-3 py-2 rounded-md text-sm font-medium bg-slate-100">History</a>
                    </div>
                </div>
                <div class="flex items-center">
                    <div class="h-9 w-9 rounded-full bg-indigo-600 text-white text-sm font-semibold flex items-center justify-center">A</div>
                </div>
            </div>
        </div>
    </nav>

    <main class="flex-grow max-w-7xl w-full mx-auto p-6 md:p-8">
        <section class="bg-white rounded-xl shadow-lg border border-slate-100 p-6 md:p-8">
            <div class="flex items-center justify-between mb-6">
                <h1 class="text-3xl font-bold text-slate-900">Scan History</h1>
                <a href="/new-scan" class="px-4 py-2 bg-indigo-600 text-white rounded-lg text-sm font-medium hover:bg-indigo-700">New Scan</a>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full text-sm">
                    <thead>
                        <tr class="text-left text-slate-500 border-b border-slate-200">
                            <th class="pb-3">File</th>
                            <th class="pb-3">Date</th>
                            <th class="pb-3">Words</th>
                            <th class="pb-3">Confidence</th>
                            <th class="pb-3">Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr class="border-b border-slate-100">
                            <td class="py-4">notebook_page_01.jpg</td>
                            <td class="py-4">2026-04-27</td>
                            <td class="py-4">187</td>
                            <td class="py-4 text-emerald-600 font-semibold">94%</td>
                            <td class="py-4"><a href="/results" class="text-indigo-600 hover:underline">View</a></td>
                        </tr>
                        <tr class="border-b border-slate-100">
                            <td class="py-4">lecture_note_12.jpg</td>
                            <td class="py-4">2026-04-26</td>
                            <td class="py-4">143</td>
                            <td class="py-4 text-emerald-600 font-semibold">92%</td>
                            <td class="py-4"><a href="/results" class="text-indigo-600 hover:underline">View</a></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>
</body>
</html>
