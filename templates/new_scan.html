<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pashto OCR - New Scan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col">
    <nav class="bg-white shadow-sm border-b border-slate-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center space-x-8">
                    <a href="/" class="text-blue-600 font-extrabold text-2xl tracking-tight">Pashto OCR</a>
                    <div class="hidden md:flex space-x-4">
                        <a href="/" class="text-slate-500 hover:text-slate-900 px-3 py-2 rounded-md text-sm font-medium">Dashboard</a>
                        <a href="/new-scan" class="text-slate-900 px-3 py-2 rounded-md text-sm font-medium bg-slate-100">New Scan</a>
                        <a href="/history" class="text-slate-500 hover:text-slate-900 px-3 py-2 rounded-md text-sm font-medium">History</a>
                    </div>
                </div>
                <div class="flex items-center">
                    <div class="h-9 w-9 rounded-full bg-indigo-600 text-white text-sm font-semibold flex items-center justify-center">A</div>
                </div>
            </div>
        </div>
    </nav>

    <main class="flex-grow flex items-center justify-center p-6">
        <section class="w-full max-w-4xl bg-white rounded-xl shadow-lg border border-slate-100 p-8 md:p-12">
            <h1 class="text-3xl font-bold text-slate-900">Start A New Scan</h1>
            <p class="text-slate-500 mt-2">Choose an image and start OCR processing with your model pipeline.</p>

            <div class="mt-8 border-2 border-dashed border-slate-300 rounded-xl p-12 text-center">
                <p class="text-lg font-medium">Drop a document here</p>
                <p class="text-sm text-slate-500 mt-1">PNG, JPG, JPEG</p>
            </div>

            <div class="mt-6 flex flex-wrap gap-3">
                <a href="/" class="px-6 py-3 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg font-medium shadow-sm">Go To Dashboard Upload</a>
                <a href="/results" class="px-6 py-3 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-lg font-medium">Open Results Demo</a>
            </div>
        </section>
    </main>
</body>
</html>
