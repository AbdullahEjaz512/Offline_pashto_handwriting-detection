<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pashto OCR - New Scan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col">
    <nav class="bg-white shadow-sm border-b border-slate-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center space-x-8">
                    <a href="/" class="text-blue-600 font-extrabold text-2xl tracking-tight">Pashto OCR</a>
                    <div class="hidden md:flex space-x-4">
                        <a href="/" class="text-slate-500 hover:text-slate-900 px-3 py-2 rounded-md text-sm font-medium">Dashboard</a>
                        <a href="/new-scan" class="text-slate-900 px-3 py-2 rounded-md text-sm font-medium bg-slate-100">New Scan</a>
                        <a href="/history" class="text-slate-500 hover:text-slate-900 px-3 py-2 rounded-md text-sm font-medium">History</a>
                    </div>
                </div>
                <div class="flex items-center">
                    <div class="h-9 w-9 rounded-full bg-indigo-600 text-white text-sm font-semibold flex items-center justify-center">A</div>
                </div>
            </div>
        </div>
    </nav>

    <main class="flex-grow flex items-center justify-center p-6">
        <section class="w-full max-w-4xl bg-white rounded-xl shadow-lg border border-slate-100 p-8 md:p-12">
            <h1 class="text-3xl font-bold text-slate-900">Start A New Scan</h1>
            <p class="text-slate-500 mt-2">Upload a handwritten Pashto document and run OCR.</p>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            <div class="mt-6 space-y-2">
                {% for category, message in messages %}
                <div class="rounded-lg px-4 py-3 text-sm {{ 'bg-red-50 text-red-700 border border-red-200' if category == 'error' else 'bg-emerald-50 text-emerald-700 border border-emerald-200' }}">
                    {{ message }}
                </div>
                {% endfor %}
            </div>
            {% endif %}
            {% endwith %}

            <form id="scan-form" action="/predict" method="post" enctype="multipart/form-data" class="mt-8">
                <label id="dropzone" for="document" class="block border-2 border-dashed border-slate-300 rounded-xl p-12 text-center cursor-pointer hover:border-indigo-400 hover:bg-slate-50 transition-colors">
                    <svg class="mx-auto h-16 w-16 text-slate-400 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
                    </svg>
                    <p class="text-xl font-medium text-slate-700">Drag and Drop your Pashto document here or Browse</p>
                    <p class="text-sm text-slate-500 mt-2">Supported: PNG, JPG, JPEG, WEBP, BMP, TIFF</p>
                    <input id="document" name="document" type="file" accept="image/*" class="hidden" required>
                </label>

                <div id="file-preview" class="hidden mt-4 rounded-lg border border-slate-200 bg-slate-50 p-4">
                    <p id="file-name" class="text-sm font-semibold text-slate-700"></p>
                    <p id="file-size" class="text-xs text-slate-500 mt-1"></p>
                </div>

                <div class="mt-6 flex flex-wrap gap-3">
                    <button id="start-btn" type="submit" class="px-6 py-3 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg font-medium shadow-sm disabled:opacity-50 disabled:cursor-not-allowed flex items-center gap-2" disabled>
                        <span id="btn-text">Start Recognition</span>
                        <svg id="btn-spinner" class="hidden h-4 w-4 animate-spin" viewBox="0 0 24 24" fill="none">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                        </svg>
                    </button>
                    <a href="/history" class="px-6 py-3 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-lg font-medium">View History</a>
                </div>
            </form>
        </section>
    </main>

    <script>
        const input = document.getElementById('document');
        const dropzone = document.getElementById('dropzone');
        const preview = document.getElementById('file-preview');
        const fileName = document.getElementById('file-name');
        const fileSize = document.getElementById('file-size');
        const startBtn = document.getElementById('start-btn');
        const form = document.getElementById('scan-form');
        const btnText = document.getElementById('btn-text');
        const spinner = document.getElementById('btn-spinner');

        function updateFilePreview(file) {
            fileName.textContent = file.name;
            fileSize.textContent = `${(file.size / (1024 * 1024)).toFixed(2)} MB`;
            preview.classList.remove('hidden');
            startBtn.disabled = false;
        }

        input.addEventListener('change', () => {
            if (input.files && input.files[0]) {
                updateFilePreview(input.files[0]);
            }
        });

        ['dragenter', 'dragover'].forEach((eventName) => {
            dropzone.addEventListener(eventName, (event) => {
                event.preventDefault();
                dropzone.classList.add('border-indigo-400', 'bg-slate-50');
            });
        });

        ['dragleave', 'drop'].forEach((eventName) => {
            dropzone.addEventListener(eventName, (event) => {
                event.preventDefault();
                dropzone.classList.remove('border-indigo-400', 'bg-slate-50');
            });
        });

        dropzone.addEventListener('drop', (event) => {
            const file = event.dataTransfer.files[0];
            if (!file) {
                return;
            }
            const transfer = new DataTransfer();
            transfer.items.add(file);
            input.files = transfer.files;
            updateFilePreview(file);
        });

        form.addEventListener('submit', () => {
            btnText.textContent = 'Processing AI Models...';
            spinner.classList.remove('hidden');
            startBtn.disabled = true;
        });
    </script>
</body>
</html>
