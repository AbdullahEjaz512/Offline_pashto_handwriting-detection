<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pashto OCR - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col">
    <!-- Navbar -->
    <nav class="bg-white shadow-sm border-b border-slate-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center space-x-8">
                    <div class="flex-shrink-0 flex items-center">
                        <a href="/" class="text-blue-600 font-extrabold text-2xl tracking-tight">Pashto OCR</a>
                    </div>
                    <div class="hidden md:flex space-x-4">
                        <a href="/" class="text-slate-900 px-3 py-2 rounded-md text-sm font-medium bg-slate-100">Dashboard</a>
                        <a href="/new-scan" class="text-slate-500 hover:text-slate-900 px-3 py-2 rounded-md text-sm font-medium">New Scan</a>
                        <a href="/history" class="text-slate-500 hover:text-slate-900 px-3 py-2 rounded-md text-sm font-medium">History</a>
                    </div>
                </div>
                <div class="flex items-center">
                    <div class="h-9 w-9 rounded-full bg-indigo-600 text-white text-sm font-semibold flex items-center justify-center">A</div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow flex items-center justify-center p-6">
        <div class="max-w-3xl w-full bg-white rounded-xl shadow-lg p-10 border border-slate-100">
            <div class="text-center mb-10">
                <h1 class="text-3xl font-bold text-slate-900 mb-2">Upload Document</h1>
                <p class="text-slate-500">Extract text from Pashto handwritten notes instantly using AI.</p>
            </div>

            <!-- Upload Zone -->
            <div id="dropzone" class="border-2 border-dashed border-slate-300 rounded-xl p-12 text-center hover:bg-slate-50 hover:border-indigo-400 transition-colors cursor-pointer" onclick="document.getElementById('file-upload').click()">
                <p class="text-lg font-medium text-slate-700">Drag & Drop your Pashto document here</p>
                <p class="text-sm text-slate-500 mt-1">or click to browse from your computer</p>
                <input id="file-upload" type="file" accept="image/*" class="hidden">
            </div>

            <!-- File Preview -->
            <div id="file-preview" class="hidden mt-6 bg-slate-50 border border-slate-200 rounded-lg p-4 flex items-center justify-between">
                <div>
                    <p id="file-name" class="text-sm font-semibold text-slate-700"></p>
                    <p id="file-size" class="text-xs text-slate-500"></p>
                </div>
            </div>

            <!-- Submit Button -->
            <div class="mt-8 text-center">
                <button id="start-btn" class="w-full md:w-auto px-8 py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-medium rounded-lg shadow-md transition-all disabled:opacity-50 disabled:cursor-not-allowed mx-auto" disabled onclick="startProcessing()">
                    <span id="btn-text">Start Recognition</span>
                </button>
            </div>
        </div>
    </main>

    <script>
        const fileInput = document.getElementById('file-upload');
        const dropzone = document.getElementById('dropzone');
        const filePreview = document.getElementById('file-preview');
        const fileName = document.getElementById('file-name');
        const fileSize = document.getElementById('file-size');
        const startBtn = document.getElementById('start-btn');
        const btnText = document.getElementById('btn-text');

        fileInput.addEventListener('change', function() {
            if (this.files && this.files[0]) {
                const file = this.files[0];
                fileName.textContent = file.name;
                fileSize.textContent = (file.size / (1024 * 1024)).toFixed(2) + ' MB';
                dropzone.classList.add('hidden');
                filePreview.classList.remove('hidden');
                startBtn.removeAttribute('disabled');
            }
        });

        function startProcessing() {
            btnText.textContent = 'Processing AI Models...';
            startBtn.setAttribute('disabled', 'true');
            setTimeout(() => {
                window.location.href = '/results';
            }, 1000);
        }
    </script>
</body>
</html>
